name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: "3.9"
            qt-package: "PyQt5"
          - python-version: "3.11"
            qt-package: "PyQt6"
          - python-version: "3.12"
            qt-package: "PyQt6"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pytest ${{ matrix.qt-package }}

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONPATH: src
        run: |
          python -m pytest tests/ -v -k "not test_add_action and not test_quick_access_bar_add"
